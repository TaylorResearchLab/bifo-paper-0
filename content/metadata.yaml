####################################################################################
# bifo-paper-0 manuscript metadata
#
# This file is rendered by Manubot during the GitHub Actions build. Fields here
# control the title page, byline, keywords, and author affiliations of the
# generated HTML/PDF.
#
# License (per Paper 0 plan, Apr 27 2026): the manuscript will be released under
# CC BY-NC-ND 4.0 to mirror the HSCLO Scientific Data paper. The license override
# is applied via LICENSE.md (replaced separately in Step 4); rootstock has no
# `license` field in metadata.yaml.
####################################################################################

title: "Biological Information Flow Ontology: A Framework for Mechanistically Constrained Propagation in Biomedical Knowledge Graphs"

keywords:
  - biological information flow
  - knowledge graph
  - ontology
  - propagation
  - graph conditioning
  - personalized pagerank
  - biomedical knowledge graph
  - mechanistic constraint
  - admissibility

lang: en-US

